
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VZMO Final</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#000;color:#fff;overflow:hidden;}
canvas{position:absolute;top:0;left:0;}

.ui{
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
pointer-events:none;
}

.panel{
position:absolute;bottom:20px;display:flex;gap:10px;
background:rgba(0,0,0,0.4);padding:10px;
backdrop-filter:blur(10px);
}

.btn{
padding:8px 14px;border:1px solid rgba(255,255,255,0.3);
background:transparent;color:#fff;cursor:pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="ui">
<h1>VZMO</h1>
<p>Final Reactive System</p>
</div>

<div class="panel">
<button class="btn" id="mic">Enable Mic</button>
<button class="btn" id="reset">Reset</button>
</div>

<script>

/* ======================
   TIME (REAL)
====================== */
const getTime = () => performance.now()*0.001;

/* ======================
   THREE SETUP
====================== */
const canvas = document.getElementById('bg');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(innerWidth, innerHeight);

/* ======================
   RIPPLE SYSTEM
====================== */
const MAX_RIPPLES = 5;

const uniforms = {
time:{value:0},
audioLow:{value:0.5},
audioHigh:{value:0.5},
beat:{value:0},

rippleUV:{value: Array.from({length:MAX_RIPPLES}, ()=>new THREE.Vector2(0.5,0.5))},
rippleTime:{value: new Float32Array(MAX_RIPPLES)}
};

let rippleIndex = 0;

function addRipple(uv){
uniforms.rippleUV.value[rippleIndex].copy(uv);
uniforms.rippleTime.value[rippleIndex] = getTime();

/* ensure GPU update */
uniforms.rippleUV.needsUpdate = true;
uniforms.rippleTime.needsUpdate = true;

rippleIndex = (rippleIndex + 1) % MAX_RIPPLES;
}

/* ======================
   SHADER
====================== */
const material = new THREE.ShaderMaterial({
uniforms,
vertexShader:`
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vView;

void main(){
vUv = uv;
vNormal = normalize(normalMatrix * normal);
vec4 mv = modelViewMatrix * vec4(position,1.0);
vView = normalize(-mv.xyz);
gl_Position = projectionMatrix * mv;
}
`,
fragmentShader:`
#define MAX_RIPPLES 5

uniform float time;
uniform float audioLow;
uniform float audioHigh;
uniform float beat;

uniform vec2 rippleUV[MAX_RIPPLES];
uniform float rippleTime[MAX_RIPPLES];

varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vView;

void main(){

vec2 uv = vUv;

/* liquid motion */
uv += sin(uv.y*8.0 + time*2.0)*0.02*(0.5+audioLow);
uv += cos(uv.x*8.0 + time*2.0)*0.02*(0.5+audioLow);

/* fresnel */
float fresnel = pow(1.0 - dot(normalize(vNormal), normalize(vView)), 2.5);
vec3 base = mix(vec3(0.08,0.08,0.1), vec3(0.8,0.9,1.0), fresnel);

/* ripple waves */
float rippleSum = 0.0;

for(int i=0;i<MAX_RIPPLES;i++){
float t = time - rippleTime[i];
if(t < 0.0 || t > 2.0) continue;

float d = distance(uv, rippleUV[i]);

float wave = sin(20.0*d - t*6.0);
float fade = exp(-3.0*d) * (1.0 - t/2.0);

rippleSum += wave * fade;
}

base += rippleSum * 0.15;

/* audio */
base += audioHigh * 0.2;

/* beat pulse */
base += beat * 0.3;

gl_FragColor = vec4(base,1.0);
}
`
});

/* ======================
   OBJECT
====================== */
const mesh = new THREE.Mesh(
new THREE.SphereGeometry(1,64,64),
material
);
scene.add(mesh);

/* ======================
   RAYCAST (ONLY ON MOVE)
====================== */
const raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let lastMouse = new THREE.Vector2(999,999);

function updateRaycast(){
if(mouse.distanceToSquared(lastMouse) < 0.000001) return;

lastMouse.copy(mouse);

raycaster.setFromCamera(mouse, camera);
const hit = raycaster.intersectObject(mesh);

if(hit.length){
addRipple(hit[0].uv);
}
}

/* ======================
   INPUT
====================== */
function setMouse(x,y){
mouse.set(x*2-1, -(y*2-1));
}

addEventListener('mousemove',e=>{
setMouse(e.clientX/innerWidth, e.clientY/innerHeight);
});

addEventListener('touchmove',e=>{
let t=e.touches[0];
setMouse(t.clientX/innerWidth, t.clientY/innerHeight);
});

/* ======================
   AUDIO
====================== */
let analyser, data;
let smLow=0.5, smHigh=0.5;
let env=0, threshold=0.3;

document.getElementById('mic').addEventListener('click', async ()=>{
try{
const stream = await navigator.mediaDevices.getUserMedia({audio:true});
const ctx = new AudioContext();
await ctx.resume();

const src = ctx.createMediaStreamSource(stream);

analyser = ctx.createAnalyser();
analyser.fftSize = 128;

src.connect(analyser);
data = new Uint8Array(analyser.frequencyBinCount);
}catch{}
});

function updateAudio(){
if(!analyser) return;

analyser.getByteFrequencyData(data);

let low=0, high=0;
for(let i=0;i<data.length/2;i++) low+=data[i];
for(let i=data.length/2;i<data.length;i++) high+=data[i];

low /= (data.length/2);
high /= (data.length/2);

/* smoothing */
smLow += (low/255 - smLow)*0.1;
smHigh += (high/255 - smHigh)*0.1;

uniforms.audioLow.value = smLow;
uniforms.audioHigh.value = smHigh;

/* envelope */
env += (smLow - env)*0.3;

/* clamp threshold */
threshold = Math.max(threshold, 0.1);

/* beat detect */
if(env > threshold && env > 0.15){
uniforms.beat.value = 1.0;
threshold = env * 1.1;
}else{
uniforms.beat.value *= 0.85;
threshold *= 0.995;
}
}

/* ======================
   RESET
====================== */
document.getElementById('reset').addEventListener('click',()=>{
mouse.set(0,0);
});

/* ======================
   ANIMATION
====================== */
function animate(){
requestAnimationFrame(animate);

uniforms.time.value = getTime();

updateRaycast();
updateAudio();

mesh.rotation.y += 0.003;

renderer.render(scene,camera);
}
animate();

/* ======================
   RESIZE
====================== */
addEventListener('resize',()=>{
renderer.setSize(innerWidth, innerHeight);
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
});

</script>

</body>
  </html>
