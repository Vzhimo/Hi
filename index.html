<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VZMO — System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#000;color:#fff;overflow-x:hidden;-webkit-tap-highlight-color:transparent;cursor:none;}

/* TERMINAL */
.terminal{
position:fixed;inset:0;background:#000;color:#0f0;
font-family:monospace;padding:20px;
z-index:99999;
}
.terminal.hidden{display:none;}
.line{opacity:0;margin:5px 0;}
.line.show{opacity:1;transition:0.3s;}

/* GLITCH FLASH */
.flash{
position:fixed;inset:0;background:#fff;
opacity:0;pointer-events:none;z-index:99998;
}

/* CURSOR */
.cursor,.cursor-glow{
position:fixed;pointer-events:none;border-radius:50%;
transform:translate(-50%,-50%);
}
.cursor{width:15px;height:15px;border:2px solid #fff;}
.cursor-glow{width:80px;height:80px;background:rgba(255,255,255,0.05);}

/* NAV */
.nav{
position:fixed;top:0;width:100%;
padding:15px 30px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
opacity:0;transition:0.5s;z-index:999;
}
.nav.show{opacity:1;}

/* HERO */
.hero{
height:100vh;
background:url('IMG_20260418_115047.jpg') center/cover no-repeat;
display:flex;align-items:center;justify-content:center;
position:relative;
}
.hero::after{
content:"";position:absolute;inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.6),#000);
}
.hero-content{text-align:center;z-index:2;}
.hero h1{font-size:3rem;letter-spacing:10px;}
.hero p{opacity:0.6;margin-top:10px;}

/* BUTTON */
.btn{
margin-top:30px;padding:10px 20px;
border:1px solid rgba(255,255,255,0.3);
cursor:pointer;position:relative;
overflow:hidden;
}

/* SECTION */
.section{padding:100px 20px;text-align:center;}

/* CARDS */
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:30px;}
.card{
width:280px;height:180px;border-radius:12px;
background-size:cover;background-position:center;
transition:0.3s;
transform-style:preserve-3d;
}
.card:hover{box-shadow:0 0 30px rgba(255,255,255,0.3);}

/* PARTICLES */
canvas{
position:fixed;top:0;left:0;
width:100%;height:100%;
z-index:-1;
}

/* FADE */
.fade{opacity:0;transform:translateY(40px);transition:1s;}
.fade.show{opacity:1;transform:translateY(0);}

/* FOOTER */
.footer{text-align:center;padding:50px;opacity:0.5;}
</style>
</head>

<body>

<div class="terminal" id="terminal"></div>
<div class="flash" id="flash"></div>

<canvas id="particles"></canvas>

<div class="cursor"></div>
<div class="cursor-glow"></div>

<div class="nav" id="nav">
<span>VZMO</span>
<span>System</span>
</div>

<section class="hero">
<div class="hero-content fade">
<h1>VZMO</h1>
<p>A digital presence shaped by motion and silence.</p>
<div class="btn" id="enter">Enter</div>
</div>
</section>

<section class="section fade" id="target">
<h2>Visual Fragments</h2>
<div class="cards">
<div class="card" style="background-image:url('Screenshot_2026-05-06-18-28-58-929_com.camerasideas.instashot.jpg')"></div>
<div class="card" style="background-image:url('Screenshot_2026-05-06-18-29-11-657_com.camerasideas.instashot.jpg')"></div>
<div class="card" style="background-image:url('Screenshot_2026-05-06-19-09-09-757_photoeditor.cutout.backgrounderaser.jpg')"></div>
</div>
</section>

<div class="footer">End of transmission</div>

<script>

/* TERMINAL SEQUENCE */
const lines=[
"> initializing system...",
"> loading modules...",
"> verifying assets...",
"> access granted"
];
const term=document.getElementById("terminal");

let i=0;
function showLine(){
if(i<lines.length){
let div=document.createElement("div");
div.className="line";
div.innerText=lines[i];
term.appendChild(div);
setTimeout(()=>div.classList.add("show"),50);
i++;
setTimeout(showLine,500);
}else{
setTimeout(()=>{
document.getElementById("flash").style.opacity="1";
setTimeout(()=>{
term.classList.add("hidden");
document.getElementById("flash").style.opacity="0";
},200);
},500);
}
}
showLine();

/* CURSOR (desktop only) */
if(!('ontouchstart' in window)){
const c=document.querySelector('.cursor');
const g=document.querySelector('.cursor-glow');
document.addEventListener('mousemove',e=>{
c.style.left=g.style.left=e.clientX+'px';
c.style.top=g.style.top=e.clientY+'px';
});
}

/* NAV */
window.addEventListener('scroll',()=>{
if(window.scrollY>100){
document.getElementById('nav').classList.add('show');
}
});

/* SCROLL */
document.getElementById('enter').onclick=()=>{
document.getElementById('target').scrollIntoView({behavior:'smooth'});
};

/* FADE */
const f=document.querySelectorAll('.fade');
function reveal(){
f.forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight*0.85){
el.classList.add('show');
}
});
}
window.addEventListener('scroll',reveal);
reveal();

/* CARD TILT */
document.querySelectorAll('.card').forEach(card=>{
card.addEventListener('mousemove',e=>{
const r=card.getBoundingClientRect();
const x=e.clientX-r.left;
const y=e.clientY-r.top;
card.style.transform=`rotateX(${-(y/r.height-0.5)*10}deg) rotateY(${(x/r.width-0.5)*10}deg)`;
});
card.addEventListener('mouseleave',()=>{card.style.transform='rotateX(0) rotateY(0)';});
});

/* PARTICLES */
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:Math.random()-0.5,vy:Math.random()-0.5});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
ctx.fillStyle="rgba(255,255,255,0.2)";
ctx.fillRect(p.x,p.y,2,2);
});
requestAnimationFrame(draw);
}
draw();

</script>

</body>
  </html>
