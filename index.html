<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEO CORE - Compatible Futuristic 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: monospace;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
        }
        button {
            background: rgba(0,0,0,0.7);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: #0ff;
            color: black;
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ DRAG to rotate | SCROLL to zoom | 🎤 Mic = pulse & color shift
    </div>
    <div id="controls">
        <button id="micBtn">🎤 ENABLE MIC</button>
    </div>

    <!-- Three.js core + addons (global, not modules) -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Wait for everything
        (function() {
            if (!window.THREE) {
                document.getElementById('info').innerHTML = '⚠️ Three.js failed to load. Check network.';
                return;
            }

            // --- setup scene ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.01);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 2, 5);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // OrbitControls (global from addon)
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = false;
            controls.enableZoom = true;
            controls.zoomSpeed = 1.0;
            controls.rotateSpeed = 1.0;
            controls.target.set(0, 0, 0);

            // --- lights ---
            const ambient = new THREE.AmbientLight(0x22223b);
            scene.add(ambient);
            const mainLight = new THREE.PointLight(0xff44aa, 1.0);
            mainLight.position.set(2, 3, 2);
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0x44aaff, 0.8);
            fillLight.position.set(-2, 1, 3);
            scene.add(fillLight);
            const backLight = new THREE.PointLight(0x88ff88, 0.5);
            backLight.position.set(0, 2, -4);
            scene.add(backLight);
            
            // starfield background (simple points)
            const starCount = 800;
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                starPos[i*3] = (Math.random() - 0.5) * 200;
                starPos[i*3+1] = (Math.random() - 0.5) * 100;
                starPos[i*3+2] = (Math.random() - 0.5) * 80 - 40;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.6 });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);
            
            // central objects
            const knotGeo = new THREE.TorusKnotGeometry(1.1, 0.25, 160, 24, 3, 4);
            const knotMat = new THREE.MeshStandardMaterial({ color: 0x22aaff, emissive: 0x1155cc, emissiveIntensity: 0.5, metalness: 0.8, roughness: 0.3 });
            const knot = new THREE.Mesh(knotGeo, knotMat);
            scene.add(knot);
            
            const coreGeo = new THREE.SphereGeometry(0.6, 32, 32);
            const coreMat = new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff2288, emissiveIntensity: 0.7, metalness: 0.4 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);
            
            const ringGeo = new THREE.TorusGeometry(1.4, 0.05, 64, 200);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x33ccff, emissive: 0x0088aa, emissiveIntensity: 0.6 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            scene.add(ring);
            
            // orbiting particles
            const particleCount = 600;
            const partGeo = new THREE.BufferGeometry();
            const partPos = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                const r = 1.5 + Math.random() * 0.7;
                const a = Math.random() * Math.PI * 2;
                const y = (Math.random() - 0.5) * 1.2;
                partPos[i*3] = Math.cos(a) * r;
                partPos[i*3+1] = y;
                partPos[i*3+2] = Math.sin(a) * r;
            }
            partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
            const partMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.04, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(partGeo, partMat);
            scene.add(particles);
            
            // grid helper (futuristic)
            const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x335588);
            gridHelper.position.y = -1.5;
            scene.add(gridHelper);
            
            // --- audio reactivity ---
            let analyser = null;
            let audioCtx = null;
            let micActive = false;
            let audioData = null;
            let smoothVol = 0.0;
            const micBtn = document.getElementById('micBtn');
            
            micBtn.addEventListener('click', async () => {
                if (micActive) {
                    if (audioCtx) await audioCtx.close();
                    analyser = null;
                    micActive = false;
                    micBtn.textContent = '🎤 ENABLE MIC';
                    // reset colors/materials
                    knotMat.color.setHex(0x22aaff);
                    knotMat.emissiveIntensity = 0.5;
                    coreMat.color.setHex(0xff66aa);
                    coreMat.emissiveIntensity = 0.7;
                    ringMat.color.setHex(0x33ccff);
                    ringMat.emissiveIntensity = 0.6;
                    mainLight.intensity = 1.0;
                    fillLight.intensity = 0.8;
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    await ctx.resume();
                    audioCtx = ctx;
                    const source = ctx.createMediaStreamSource(stream);
                    const analyserNode = ctx.createAnalyser();
                    analyserNode.fftSize = 128;
                    source.connect(analyserNode);
                    analyser = analyserNode;
                    audioData = new Uint8Array(analyser.frequencyBinCount);
                    micActive = true;
                    micBtn.textContent = '🎤 MIC ON (pulsing)';
                } catch(e) {
                    console.warn(e);
                    micBtn.textContent = '❌ FAILED';
                    setTimeout(() => micBtn.textContent = '🎤 ENABLE MIC', 2000);
                }
            });
            
            function updateAudio() {
                if (!analyser || !micActive) {
                    smoothVol *= 0.95;
                    return smoothVol;
                }
                analyser.getByteFrequencyData(audioData);
                let sum = 0;
                for (let i = 0; i < audioData.length; i++) sum += audioData[i];
                let avg = sum / audioData.length / 255;
                smoothVol = smoothVol * 0.7 + avg * 0.3;
                // apply to materials
                const intensity = 0.4 + smoothVol * 1.2;
                knotMat.emissiveIntensity = 0.3 + smoothVol * 1.0;
                coreMat.emissiveIntensity = 0.5 + smoothVol * 1.5;
                ringMat.emissiveIntensity = 0.4 + smoothVol * 1.2;
                mainLight.intensity = 0.7 + smoothVol * 1.0;
                fillLight.intensity = 0.5 + smoothVol * 0.8;
                // color shift
                const hue = 0.55 + smoothVol * 0.2; // blue to magenta
                knotMat.color.setHSL(hue, 1.0, 0.5);
                coreMat.color.setHSL(hue + 0.1, 1.0, 0.6);
                return smoothVol;
            }
            
            // --- animation loop ---
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.015;
                
                const vol = updateAudio();
                
                // rotate objects
                knot.rotation.x = Math.sin(time * 0.3) * 0.2;
                knot.rotation.y = time * 0.5;
                knot.rotation.z = Math.cos(time * 0.4) * 0.1;
                core.rotation.x = time * 0.2;
                core.rotation.y = time * 0.3;
                ring.rotation.x = time * 0.2;
                ring.rotation.z = time * 0.15;
                particles.rotation.y = time * 0.05;
                stars.rotation.y = time * 0.01;
                
                // slight particle size change with mic
                if (micActive) partMat.size = 0.045 + vol * 0.06;
                else partMat.size = 0.04;
                
                controls.update(); // for damping
                renderer.render(scene, camera);
            }
            animate();
            
            // resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            console.log('Compatible futuristic scene started');
        })();
    </script>
</body>
</html>
