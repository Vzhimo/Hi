<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEO CORE — Futuristic Interactive 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
            letter-spacing: 1px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 20;
        }
        button {
            background: rgba(0,0,0,0.7);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        button:hover {
            background: #0ff;
            color: black;
            box-shadow: 0 0 12px #0ff;
        }
        @media (max-width: 600px) {
            button { padding: 6px 12px; font-size: 12px; }
            #info { font-size: 10px; bottom: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ NEO CORE | Drag to rotate | Scroll to zoom | 🎤 Mic = reactive pulse
    </div>
    <div id="controls">
        <button id="micBtn">🎤 ENABLE MIC</button>
    </div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- setup scene, camera, renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.008); // subtle fog

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- orbit controls (smooth interaction) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.enablePan = false;
        controls.target.set(0, 0, 0);

        // --- postprocessing: bloom (glow) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;  // intensity threshold for bloom
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- lights: dynamic neon ---
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        
        const mainLight = new THREE.PointLight(0xff44aa, 1.2, 20);
        mainLight.position.set(2, 3, 4);
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x44aaff, 0.8);
        fillLight.position.set(-2, 1, 3);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0x88ff88, 0.5);
        backLight.position.set(0, 2, -4);
        scene.add(backLight);
        
        // --- central object: intricate torus knot with wireframe + emissive ---
        const knotGeo = new THREE.TorusKnotGeometry(1.2, 0.28, 180, 24, 3, 4);
        const knotMat = new THREE.MeshStandardMaterial({
            color: 0x22aaff,
            emissive: 0x1144aa,
            emissiveIntensity: 0.6,
            metalness: 0.85,
            roughness: 0.25,
            flatShading: false
        });
        const knot = new THREE.Mesh(knotGeo, knotMat);
        scene.add(knot);
        
        // inner glowing sphere
        const coreGeo = new THREE.SphereGeometry(0.65, 32, 32);
        const coreMat = new THREE.MeshStandardMaterial({
            color: 0xff66cc,
            emissive: 0xff2299,
            emissiveIntensity: 0.9,
            metalness: 0.3,
            roughness: 0.4
        });
        const coreSphere = new THREE.Mesh(coreGeo, coreMat);
        scene.add(coreSphere);
        
        // outer ring (floating)
        const ringGeo = new THREE.TorusGeometry(1.45, 0.05, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x33ccff, emissive: 0x0088aa, emissiveIntensity: 0.8 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        scene.add(ring);
        
        // small orbiting particles around core
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            // distributed in a toroidal volume
            const radius = 1.7 + Math.random() * 0.6;
            const angle = Math.random() * Math.PI * 2;
            const height = (Math.random() - 0.5) * 1.2;
            positions[i*3] = Math.cos(angle) * radius;
            positions[i*3+1] = height;
            positions[i*3+2] = Math.sin(angle) * radius;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.035,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // floating dust / stars field (background)
        const starCount = 1200;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 100;
            starPos[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // --- Audio reactivity (optional) ---
        let analyser = null;
        let audioContext = null;
        let micActive = false;
        let audioData = new Uint8Array(0);
        let smoothedVolume = 0.0;
        
        const micButton = document.getElementById('micBtn');
        micButton.addEventListener('click', async () => {
            if (micActive) {
                // turn off mic
                if (audioContext) await audioContext.close();
                analyser = null;
                micActive = false;
                micButton.textContent = '🎤 ENABLE MIC';
                // reset default intensities
                knotMat.emissiveIntensity = 0.6;
                coreMat.emissiveIntensity = 0.9;
                ringMat.emissiveIntensity = 0.8;
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new AudioContext();
                await ctx.resume();
                audioContext = ctx;
                const source = ctx.createMediaStreamSource(stream);
                const analyserNode = ctx.createAnalyser();
                analyserNode.fftSize = 128;
                source.connect(analyserNode);
                analyser = analyserNode;
                audioData = new Uint8Array(analyser.frequencyBinCount);
                micActive = true;
                micButton.textContent = '🎤 MIC ON | PULSING';
            } catch (err) {
                console.warn('Mic error', err);
                micButton.textContent = '❌ FAILED';
                setTimeout(() => { micButton.textContent = '🎤 ENABLE MIC'; }, 2000);
            }
        });
        
        function updateAudioReactivity() {
            if (!analyser || !micActive) {
                // gradual return to normal
                smoothedVolume *= 0.95;
                return smoothedVolume;
            }
            analyser.getByteFrequencyData(audioData);
            let sum = 0;
            for (let i = 0; i < audioData.length; i++) sum += audioData[i];
            let avg = sum / audioData.length / 255; // 0..1
            // smooth
            smoothedVolume = smoothedVolume * 0.7 + avg * 0.3;
            // map to intensities
            const intensity = 0.5 + smoothedVolume * 1.2;
            knotMat.emissiveIntensity = 0.4 + smoothedVolume * 1.0;
            coreMat.emissiveIntensity = 0.6 + smoothedVolume * 1.5;
            ringMat.emissiveIntensity = 0.5 + smoothedVolume * 1.2;
            mainLight.intensity = 0.8 + smoothedVolume * 1.0;
            fillLight.intensity = 0.5 + smoothedVolume * 0.8;
            // color shift based on volume
            const hue = 0.55 + smoothedVolume * 0.2; // blue to magenta
            knotMat.color.setHSL(hue, 1.0, 0.5);
            coreMat.color.setHSL(hue + 0.1, 1.0, 0.6);
            return smoothedVolume;
        }
        
        // --- animation loop & time ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // update audio and get volume
            const vol = updateAudioReactivity();
            
            // dynamic color changes over time + audio influence
            const hueMain = (time * 0.05) % 1.0;
            // not overriding mic color if mic active, else rotate color slowly
            if (!micActive) {
                knotMat.color.setHSL(hueMain, 0.9, 0.55);
                coreMat.color.setHSL(hueMain + 0.2, 1.0, 0.6);
                ringMat.color.setHSL(hueMain + 0.5, 1.0, 0.7);
                mainLight.color.setHSL(hueMain, 1.0, 0.6);
                fillLight.color.setHSL(hueMain + 0.3, 1.0, 0.6);
            } else {
                // mic already controls colors, but add slight extra pulse
                const pulse = 1 + vol * 0.5;
                knotMat.emissiveIntensity = 0.4 + vol * 1.2;
                coreMat.emissiveIntensity = 0.6 + vol * 1.8;
                ringMat.emissiveIntensity = 0.5 + vol * 1.5;
            }
            
            // rotate objects
            knot.rotation.x = Math.sin(time * 0.3) * 0.2;
            knot.rotation.y = time * 0.4;
            knot.rotation.z = Math.cos(time * 0.5) * 0.15;
            coreSphere.rotation.x = time * 0.2;
            coreSphere.rotation.y = time * 0.3;
            ring.rotation.x = time * 0.2;
            ring.rotation.z = time * 0.1;
            particles.rotation.y = time * 0.05;
            particles.rotation.x = Math.sin(time * 0.2) * 0.1;
            stars.rotation.y = time * 0.01;
            
            // dynamic particle sizes based on volume (mic)
            if (micActive) {
                particleMat.size = 0.04 + vol * 0.06;
                starMat.size = 0.08 + vol * 0.05;
            } else {
                particleMat.size = 0.035;
                starMat.size = 0.08;
            }
            
            // update controls and render via EffectComposer
            controls.update(); // only needed if autoRotate false but we rotate objects manually
            effectComposer.render();
        }
        
        animate();
        
        // handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // little console greeting
        console.log('NEO CORE active — futuristic interactive scene');
    </script>
</body>
</html>
