<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VZMO Lite — Fixed</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<!-- MOBILE CONSOLE (optional, can be removed) -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<style>
body{margin:0;background:#000;overflow:hidden;color:#fff;font-family:sans-serif;}
.panel{
position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,0.4);padding:10px;display:flex;gap:10px;
pointer-events:auto; /* ensure clicks work */
}
button{padding:6px 12px;background:none;color:#fff;border:1px solid #fff;cursor:pointer;}
button:disabled{opacity:0.5;cursor:not-allowed;}
</style>
</head>

<body>

<div class="panel">
<button id="mic">Mic</button>
<button id="reset">Reset</button>
</div>

<script>

/* ===== BASIC SETUP ===== */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* ===== LIGHTER UNIFORMS ===== */
const uniforms = {
time:{value:0},
hit:{value:new THREE.Vector2(0.5,0.5)},
audio:{value:0.5}
};

/* ===== SIMPLIFIED SHADER (with clamping) ===== */
const material = new THREE.ShaderMaterial({
uniforms,
vertexShader:`
varying vec2 vUv;
void main(){
vUv = uv;
gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
`,
fragmentShader:`
precision mediump float;

uniform float time;
uniform vec2 hit;
uniform float audio;

varying vec2 vUv;

void main(){
vec2 uv = vUv;

/* light ripple */
float d = distance(uv, hit);
float ripple = sin(15.0*d - time*4.0);

/* soft glow */
float glow = smoothstep(0.3, 0.0, d);

/* simple chrome-ish gradient */
float shade = dot(vec3(uv,1.0), vec3(0.3,0.6,0.9));

vec3 col = vec3(shade) + ripple*0.1 + glow*audio;

/* clamp to avoid harsh colors */
col = clamp(col, 0.0, 1.0);

gl_FragColor = vec4(col,1.0);
}
`
});

/* ===== LOWER POLY SPHERE ===== */
const mesh = new THREE.Mesh(
new THREE.SphereGeometry(1,32,32),
material
);
scene.add(mesh);

/* ===== RAYCAST (optimized: only update hit when UV changes) ===== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let lastHitUV = new THREE.Vector2(-1, -1); // invalid start

function setMouse(x,y){
mouse.set(x*2-1, -(y*2-1));
}

function updateRaycast() {
    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObject(mesh);
    if (hit.length) {
        const uv = hit[0].uv;
        // only update if UV changed significantly
        if (uv.distanceTo(lastHitUV) > 0.001) {
            lastHitUV.copy(uv);
            uniforms.hit.value.copy(uv);
        }
    }
}

addEventListener('mousemove', e => {
    setMouse(e.clientX/innerWidth, e.clientY/innerHeight);
    updateRaycast(); // raycast on move
});

addEventListener('touchmove', e => {
    let t = e.touches[0];
    setMouse(t.clientX/innerWidth, t.clientY/innerHeight);
    updateRaycast();
});

// also do an initial raycast on page load (center of screen)
setMouse(0.5, 0.5);
updateRaycast();

/* ===== AUDIO (SAFE VERSION with smoothing, no duplicates) ===== */
let analyser, data, audioCtx;
let micActive = false;
let smoothAudio = 0.5;   // smoothed audio value
const micButton = document.getElementById('mic');

micButton.onclick = async () => {
    if (micActive) return; // already active

    try {
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        const ctx = new AudioContext();
        await ctx.resume();
        audioCtx = ctx;

        const src = ctx.createMediaStreamSource(stream);
        analyser = ctx.createAnalyser();
        analyser.fftSize = 64;
        src.connect(analyser);
        data = new Uint8Array(analyser.frequencyBinCount);

        micActive = true;
        micButton.innerText = "ON";
        micButton.disabled = true; // optional, prevent re-init
    } catch(e) {
        console.log("Mic error:", e);
        micButton.innerText = "Failed";
        setTimeout(() => { micButton.innerText = "Mic"; }, 2000);
    }
};

function updateAudio() {
    if (!analyser) return;

    analyser.getByteFrequencyData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i];
    let raw = (sum / data.length) / 255;

    // smooth with exponential moving average
    smoothAudio += (raw - smoothAudio) * 0.2;
    uniforms.audio.value = smoothAudio;
}

/* ===== RESET BUTTON ===== */
const resetBtn = document.getElementById('reset');
resetBtn.onclick = () => {
    // reset hit position to center UV (0.5,0.5)
    uniforms.hit.value.set(0.5, 0.5);
    lastHitUV.set(0.5, 0.5);
    // optional: also reset audio smoothing
    smoothAudio = 0.5;
    uniforms.audio.value = 0.5;
    // optional: reset camera position
    camera.position.set(0, 0, 3);
};

/* ===== ANIMATION LOOP ===== */
function animate() {
    requestAnimationFrame(animate);

    uniforms.time.value = performance.now() * 0.001;

    updateAudio();

    mesh.rotation.y += 0.003;

    renderer.render(scene, camera);
}
animate();

/* ===== RESIZE ===== */
addEventListener('resize', () => {
    renderer.setSize(innerWidth, innerHeight);
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
});

/* optional: if you want a ripple on click/tap as well */
function addClickRipple(e) {
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    const x = clientX / innerWidth;
    const y = 1 - (clientY / innerHeight);
    setMouse(x, y);
    updateRaycast();
}
addEventListener('click', addClickRipple);
addEventListener('touchstart', addClickRipple);

</script>
</body>
   </html>
