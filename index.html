<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complex Interactive Site</title>
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #f4f4f4;
    }
    header nav {
      background: #333;
      padding: 10px;
    }
    header nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
    }
    header nav ul li {
      margin: 0 15px;
    }
    header nav ul li a {
      color: white;
      text-decoration: none;
    }
    .section {
      padding: 40px;
      text-align: center;
    }
    #galleryGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }
    #galleryGrid img {
      width: 100%;
      border-radius: 8px;
    }
    #gameArea {
      width: 400px;
      height: 300px;
      margin: auto;
      background: #eee;
      position: relative;
      overflow: hidden;
    }
    #targetBox {
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      cursor: pointer;
    }
    form input, form textarea {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 80%;
    }
    form button {
      padding: 10px 20px;
      background: #4a90e2;
      color: white;
      border: none;
      cursor: pointer;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      z-index: -1;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#gallery">Gallery</a></li>
        <li><a href="#game">Game</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="home" class="section">
    <h1>Welcome to My Complex Site</h1>
    <p>Interactive, responsive, and fun!</p>
    <canvas id="bgCanvas"></canvas>
  </section>

  <section id="gallery" class="section">
    <h2>Gallery</h2>
    <div id="galleryGrid"></div>
  </section>

  <section id="game" class="section">
    <h2>Mini Game</h2>
    <p>Click the moving box to score points!</p>
    <div id="gameArea">
      <div id="targetBox"></div>
    </div>
    <p id="score">Score: 0</p>
  </section>

  <section id="contact" class="section">
    <h2>Contact Me</h2>
    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <textarea id="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send</button>
    </form>
    <p id="formStatus"></p>
  </section>

  <script>
    // Background animation
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    for (let i = 0; i < 100; i++) {
      particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3});
    }
    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = 'rgba(74,144,226,0.5)';
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
        p.y += 0.5;
        if (p.y > canvas.height) p.y = 0;
      });
      requestAnimationFrame(animate);
    }
    animate();

    // Gallery loader
    const galleryGrid = document.getElementById('galleryGrid');
    const images = [
      'https://source.unsplash.com/random/400x300?nature',
      'https://source.unsplash.com/random/400x300?city',
      'https://source.unsplash.com/random/400x300?technology'
    ];
    images.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      galleryGrid.appendChild(img);
    });

    // Mini game
    let score = 0;
    const targetBox = document.getElementById('targetBox');
    function moveBox() {
      targetBox.style.left = Math.random()*350 + 'px';
      targetBox.style.top = Math.random()*250 + 'px';
    }
    setInterval(moveBox, 1000);
    targetBox.addEventListener('click', () => {
      score++;
      document.getElementById('score').innerText = "Score: " + score;
    });

    // Contact form validation
    document.getElementById('contactForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      if(name && email && message) {
        document.getElementById('formStatus').innerText = "Message sent successfully!";
      } else {
        document.getElementById('formStatus').innerText = "Please fill all fields.";
      }
    });
  </script>
</body>
</html>
