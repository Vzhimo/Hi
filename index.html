<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VZMO Lite — Local Stable</title>

<!-- LOAD LOCAL THREE.JS -->
<script src="three.min.js"></script>

<!-- Optional mobile console -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<style>
body{margin:0;background:#000;overflow:hidden;color:#fff;font-family:sans-serif;}
.panel{
position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,0.4);padding:10px;display:flex;gap:10px;
}
button{padding:6px 12px;background:none;color:#fff;border:1px solid #fff;}
</style>
</head>

<body>

<div class="panel">
<button id="mic">Mic</button>
<button id="reset">Reset</button>
</div>

<script>

/* ===== SAFETY CHECK ===== */
if (typeof THREE === "undefined") {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:40vh;'>Three.js not loaded</h2>";
    throw new Error("Three.js failed to load");
}

/* ===== SCENE ===== */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* ===== UNIFORMS ===== */
const uniforms = {
time:{value:0},
hit:{value:new THREE.Vector2(0.5,0.5)},
audio:{value:0.5}
};

/* ===== SHADER ===== */
const material = new THREE.ShaderMaterial({
uniforms,
vertexShader:`
varying vec2 vUv;
void main(){
vUv = uv;
gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
`,
fragmentShader:`
precision mediump float;

uniform float time;
uniform vec2 hit;
uniform float audio;

varying vec2 vUv;

void main(){
vec2 uv = vUv;

float d = distance(uv, hit);

/* better ripple */
float ripple = sin(20.0*d - time*6.0) * exp(-3.0*d);

/* glow */
float glow = smoothstep(0.3, 0.0, d);

/* lighting */
float shade = dot(normalize(vec3(uv,1.0)), normalize(vec3(0.3,0.6,0.9)));
shade = shade * 0.5 + 0.5;

vec3 col = vec3(shade) + ripple*0.15 + glow*audio;

col = clamp(col, 0.0, 1.0);

gl_FragColor = vec4(col,1.0);
}
`
});

/* ===== SPHERE ===== */
const mesh = new THREE.Mesh(
new THREE.SphereGeometry(1,32,32),
material
);
scene.add(mesh);

/* ===== RAYCAST ===== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let lastUV = new THREE.Vector2(-1,-1);

function setMouse(x,y){
mouse.set(x*2-1, -(y*2-1));
}

function updateRaycast(){
raycaster.setFromCamera(mouse,camera);
const hit = raycaster.intersectObject(mesh);

if(hit.length){
const uv = hit[0].uv;
if(uv.distanceTo(lastUV) > 0.001){
lastUV.copy(uv);
uniforms.hit.value.copy(uv);
}
}
}

/* input */
addEventListener('mousemove',e=>{
setMouse(e.clientX/innerWidth, e.clientY/innerHeight);
updateRaycast();
});

addEventListener('touchmove',e=>{
let t=e.touches[0];
setMouse(t.clientX/innerWidth, t.clientY/innerHeight);
updateRaycast();
});

/* click ripple */
addEventListener('click',e=>{
setMouse(e.clientX/innerWidth, e.clientY/innerHeight);
updateRaycast();
});

/* ===== AUDIO ===== */
let analyser, data;
let smooth = 0.5;

document.getElementById('mic').onclick = async ()=>{
try{
const stream = await navigator.mediaDevices.getUserMedia({audio:true});
const ctx = new AudioContext();
await ctx.resume();

const src = ctx.createMediaStreamSource(stream);
analyser = ctx.createAnalyser();
analyser.fftSize = 64;

src.connect(analyser);
data = new Uint8Array(analyser.frequencyBinCount);

document.getElementById('mic').innerText = "ON";
}catch(e){
console.log(e);
}
};

function updateAudio(){
if(!analyser) return;

analyser.getByteFrequencyData(data);

let sum=0;
for(let i=0;i<data.length;i++) sum+=data[i];

let raw = (sum/data.length)/255;

/* smoothing */
smooth += (raw - smooth)*0.2;

uniforms.audio.value = smooth;
}

/* ===== RESET ===== */
document.getElementById('reset').onclick = ()=>{
uniforms.hit.value.set(0.5,0.5);
camera.position.set(0,0,3);
};

/* ===== LOOP ===== */
function animate(){
requestAnimationFrame(animate);

uniforms.time.value = performance.now()*0.001;

updateAudio();

/* subtle motion */
camera.position.x = Math.sin(uniforms.time.value*0.3)*0.2;
camera.lookAt(scene.position);

mesh.rotation.y += 0.003;

renderer.render(scene,camera);
}
animate();

/* ===== RESIZE ===== */
addEventListener('resize',()=>{
renderer.setSize(innerWidth, innerHeight);
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
});

</script>

</body>
</html>
